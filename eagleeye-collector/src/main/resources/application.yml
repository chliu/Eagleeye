spring:
  application:
    name: eagleeye-collector

eagleeye:
  collector:
    enabled: true

  datasource:
    url: jdbc:h2:file:${user.home}/.eagleeye/data/eagleeye;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false

  h2:
    console:
      enabled: false

logging:
  level:
    com.eagleeye: INFO

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:sqlite:${user.home}/.eagleeye/data/eagleeye.db?journal_mode=WAL
    driver-class-name: org.sqlite.JDBC

  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update

---
spring:
  config:
    activate:
      on-profile: postgres

  datasource:
    url: jdbc:postgresql://localhost:5432/eagleeye
    driver-class-name: org.postgresql.Driver
    username: ${DB_USER:eagleeye}
    password: ${DB_PASSWORD:}

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
