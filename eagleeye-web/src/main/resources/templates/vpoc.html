<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EagleEye — VPOC Chart</title>
<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:        #1a1a1a;
  --surface:   #222222;
  --border:    #333333;
  --text:      #e0e0e0;
  --muted:     #888888;
  --amber:     #d97706;
  --amber-dim: #92510440;
  --red:       #ef4444;
  --green:     #22c55e;
  --blue:      #378add;
  --grid:      #2a2a2a;
  --mono:      'JetBrains Mono','Fira Code','SF Mono',monospace;
}
body { background: var(--bg); color: var(--text); font-family: var(--mono); font-size: 12px; }

/* ── Header ── */
.header { background: var(--surface); border-bottom: 1px solid var(--border); }
.header-inner {
  max-width: 1600px; margin: 0 auto; padding: 10px 16px;
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
}
.header-title { font-size: 13px; font-weight: 700; color: var(--amber); white-space: nowrap; }
.header-title span { color: var(--muted); font-weight: 400; }
.date-select {
  background: var(--bg); border: 1px solid var(--border); color: var(--text);
  font-family: var(--mono); font-size: 11px; padding: 4px 8px; border-radius: 3px; cursor: pointer;
}
.interval-btns { display: flex; gap: 4px; }
.interval-btn {
  background: var(--bg); border: 1px solid var(--border); color: var(--muted);
  padding: 2px 10px; border-radius: 3px; cursor: pointer; font-size: 10px; font-family: var(--mono);
}
.interval-btn.active { border-color: var(--amber); color: var(--amber); background: var(--amber-dim); }
.nav-link { color: var(--muted); font-size: 11px; text-decoration: none; }
.nav-link:hover { color: var(--amber); }
.nav-spacer { margin-left: auto; }

/* ── Metrics ── */
.metrics {
  max-width: 1600px; margin: 10px auto; padding: 0 16px;
  display: flex; gap: 8px; flex-wrap: wrap;
}
.metric-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 4px;
  padding: 8px 12px; min-width: 120px;
}
.metric-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; }
.metric-value { font-size: 18px; font-weight: 700; margin-top: 2px; font-variant-numeric: tabular-nums; }
.metric-sub   { font-size: 10px; color: var(--muted); }
.vpoc-card .metric-value { color: var(--amber); }
.vah-card  .metric-value { color: var(--red); }
.val-card  .metric-value { color: var(--green); }

/* ── Legend ── */
.legend-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 4px;
  padding: 8px 12px;
}
.legend-rows { display: flex; flex-direction: column; gap: 3px; margin-top: 4px; }
.legend-row  { display: flex; align-items: center; gap: 6px; font-size: 10px; color: var(--muted); }
.legend-arrow, .legend-dot { font-size: 11px; width: 14px; text-align: center; flex-shrink: 0; }
.legend-bubble {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
  background: linear-gradient(135deg, #22c55e 50%, #ef4444 50%);
  opacity: 0.8;
}

/* ── Main grid ── */
.main-grid {
  max-width: 1600px; margin: 0 auto; padding: 0 16px 16px;
  display: grid; grid-template-columns: 1fr 200px; gap: 8px;
}
.chart-wrap {
  position: relative; height: 600px;
  background: var(--surface); border: 1px solid var(--border); border-radius: 4px; overflow: hidden;
}
.vp-panel {
  position: relative;
  background: var(--surface); border: 1px solid var(--border); border-radius: 4px; overflow: hidden;
}

/* ── Plan section ── */
.plan-section {
  max-width: 1600px; margin: 0 auto 16px; padding: 0 16px;
  display: grid; grid-template-columns: 280px 1fr; gap: 10px;
}
.plan-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 4px; padding: 12px 14px;
}
.plan-title {
  font-size: 11px; font-weight: 600; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px;
}
.key-message {
  font-size: 11px; color: var(--muted); padding: 8px 10px;
  background: var(--grid); border-radius: 3px; line-height: 1.6; margin-bottom: 12px;
}
.levels-table { width: 100%; border-collapse: collapse; font-size: 11px; }
.levels-table td { padding: 4px 8px; border-bottom: 1px solid var(--grid); }
.levels-table td:last-child { text-align: right; color: var(--muted); font-size: 10px; }
.level-price { font-weight: 700; font-variant-numeric: tabular-nums; }
.level-label { color: var(--muted); }
.level-bar-cell { width: 60px; }
.level-bar-wrap { height: 6px; background: var(--grid); border-radius: 2px; }
.level-bar { height: 100%; border-radius: 2px; }
.level-row-vah  .level-price { color: var(--red); }
.level-row-vpoc .level-price { color: var(--amber); }
.level-row-val  .level-price { color: var(--green); }
.divider-row td {
  padding: 2px 8px; border-bottom: 1px solid var(--border);
  font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px;
}
.scenarios-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 12px 14px; }
.scenario-card { border: 1px solid var(--border); border-radius: 3px; margin-bottom: 4px; overflow: hidden; }
.scenario-header {
  display: flex; align-items: center; padding: 8px 10px;
  cursor: pointer; gap: 8px; user-select: none;
}
.scenario-header:hover { background: var(--grid); }
.scenario-bias-bar { width: 3px; height: 16px; border-radius: 1px; flex-shrink: 0; }
.bias-BULLISH        .scenario-bias-bar { background: var(--green); }
.bias-NEUTRAL        .scenario-bias-bar { background: var(--muted); }
.bias-BEARISH        .scenario-bias-bar { background: var(--red); }
.bias-STRONG_BEARISH .scenario-bias-bar { background: #dc2626; }
.scenario-title   { font-size: 11px; font-weight: 600; flex: 1; }
.scenario-chevron { color: var(--muted); font-size: 10px; transition: transform 0.2s; }
.scenario-card.open .scenario-chevron { transform: rotate(180deg); }
.scenario-body {
  display: none; padding: 8px 10px 10px 21px;
  font-size: 11px; line-height: 1.7; border-top: 1px solid var(--border);
}
.scenario-card.open .scenario-body { display: block; }
.scenario-row { display: flex; gap: 6px; margin-bottom: 2px; }
.scenario-key { color: var(--muted); min-width: 56px; flex-shrink: 0; }
.scenario-targets { list-style: none; }
.scenario-targets li::before { content: "→ "; color: var(--amber); }

/* ── VP bars ── */
.vp-bar-row  { position: absolute; left: 0; right: 0; display: flex; align-items: center; }
.vp-bar-fill { height: 100%; border-radius: 1px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-title">EagleEye <span>/ VPOC Chart</span></div>
    <select id="dateSelect" class="date-select"><option>載入中...</option></select>
    <div class="interval-btns">
      <button class="interval-btn"        id="btn-1"  onclick="setIntervalMin(1)">1m</button>
      <button class="interval-btn active" id="btn-5"  onclick="setIntervalMin(5)">5m</button>
      <button class="interval-btn"        id="btn-15" onclick="setIntervalMin(15)">15m</button>
    </div>
    <a href="/dashboard" class="nav-link nav-spacer">← Dashboard</a>
    <a href="/vp"        class="nav-link">VP →</a>
  </div>
</div>

<div class="metrics">
  <div class="metric-card vpoc-card">
    <div class="metric-label">VPOC</div>
    <div class="metric-value" id="m-vpoc">—</div>
    <div class="metric-sub"  id="m-vpoc-vol">—</div>
  </div>
  <div class="metric-card vah-card">
    <div class="metric-label">VAH</div>
    <div class="metric-value" id="m-vah">—</div>
    <div class="metric-sub">價值區上緣</div>
  </div>
  <div class="metric-card val-card">
    <div class="metric-label">VAL</div>
    <div class="metric-value" id="m-val">—</div>
    <div class="metric-sub">價值區下緣</div>
  </div>
  <div class="metric-card">
    <div class="metric-label">Close vs VPOC</div>
    <div class="metric-value" id="m-cvpoc">—</div>
    <div class="metric-sub"  id="m-close">—</div>
  </div>
  <div class="metric-card">
    <div class="metric-label">總量</div>
    <div class="metric-value" id="m-vol">—</div>
    <div class="metric-sub"  id="m-ohlc">—</div>
  </div>
  <div class="legend-card">
    <div class="metric-label">圖例</div>
    <div class="legend-rows">
      <div class="legend-row"><span class="legend-arrow" style="color:#ef4444">▲</span><span>主動買（成交價高於前一筆）</span></div>
      <div class="legend-row"><span class="legend-arrow" style="color:#22c55e">▼</span><span>主動賣（成交價低於前一筆）</span></div>
      <div class="legend-row"><span class="legend-dot"              style="color:#666">●</span><span>中性（同前一筆價格）</span></div>
      <div class="legend-row"><span class="legend-bubble buy"></span><span>大單氣泡 — 綠=主動買 紅=主動賣</span></div>
    </div>
  </div>
</div>

<div class="main-grid">
  <div id="chartWrap" class="chart-wrap"></div>
  <div id="vpPanel"   class="vp-panel"></div>
</div>

<!-- 明日規劃 -->
<div class="plan-section">
  <div class="plan-card">
    <div class="plan-title">關鍵價位</div>
    <div class="key-message" id="key-message">載入中...</div>
    <table class="levels-table"><tbody id="levels-tbody"></tbody></table>
  </div>
  <div class="scenarios-wrap">
    <div class="plan-title">明日情境規劃</div>
    <div id="scenarios-container"></div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let currentDate = null, currentInterval = 5;
let chart = null, candleSeries = null, volumeSeries = null;
let overlayCanvas = null, overlayCtx = null;
let summaryData = null, candleData = [], largeTrades = [], profileData = [], planData = null;

// ── Chart init ─────────────────────────────────────────────────────────────
function initChart() {
  const wrap = document.getElementById('chartWrap');
  chart = LightweightCharts.createChart(wrap, {
    width:  wrap.clientWidth,
    height: wrap.clientHeight,
    layout: { background: { color: '#222222' }, textColor: '#888888' },
    grid:   { vertLines: { color: '#2a2a2a' }, horzLines: { color: '#2a2a2a' } },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
    rightPriceScale: { borderColor: '#333333' },
    timeScale: {
      borderColor: '#333333',
      timeVisible: true,
      secondsVisible: false,
      tickMarkFormatter: t => {
        const d = new Date((t + 8 * 3600) * 1000);
        return d.toISOString().slice(11, 16);
      }
    },
    localization: {
      timeFormatter: t => {
        const d = new Date((t + 8 * 3600) * 1000);
        return d.toISOString().slice(11, 16);
      }
    }
  });

  // K 線：保留下方 25% 給成交量副圖
  chart.priceScale('right').applyOptions({
    scaleMargins: { top: 0.05, bottom: 0.25 },
  });

  candleSeries = chart.addCandlestickSeries({
    upColor: '#ef4444', downColor: '#22c55e',
    borderVisible: false,
    wickUpColor: '#ef4444', wickDownColor: '#22c55e',
  });

  // 成交量副圖：佔下方 25%，顏色跟 K 線一致（漲紅跌綠）
  volumeSeries = chart.addHistogramSeries({
    priceFormat: { type: 'volume' },
    priceScaleId: 'vol',
  });
  chart.priceScale('vol').applyOptions({
    scaleMargins: { top: 0.78, bottom: 0 },
    borderVisible: false,
  });

  overlayCanvas = document.createElement('canvas');
  overlayCanvas.style.cssText = 'position:absolute;top:0;left:0;pointer-events:none;';
  wrap.appendChild(overlayCanvas);
  overlayCtx = overlayCanvas.getContext('2d');

  chart.timeScale().subscribeVisibleLogicalRangeChange(() => {
    redrawOverlay();
    syncVpBars();
  });

  window.addEventListener('resize', () => {
    chart.resize(wrap.clientWidth, wrap.clientHeight);
    redrawOverlay();
    syncVpBars();
  });
}

// ── Metrics ────────────────────────────────────────────────────────────────
function renderMetrics(s) {
  document.getElementById('m-vpoc').textContent    = s.vpoc.toLocaleString();
  document.getElementById('m-vpoc-vol').textContent = s.vpocVolume.toLocaleString() + ' 口';
  document.getElementById('m-vah').textContent     = s.vah.toLocaleString();
  document.getElementById('m-val').textContent     = s.val.toLocaleString();
  const sign = s.closeVsVpoc >= 0 ? '+' : '';
  document.getElementById('m-cvpoc').textContent = sign + s.closeVsVpoc.toLocaleString();
  document.getElementById('m-close').textContent = '收盤 ' + s.close.toLocaleString();
  document.getElementById('m-vol').textContent   = s.totalVolume.toLocaleString();
  document.getElementById('m-ohlc').textContent  =
    `O ${s.open.toLocaleString()} H ${s.high.toLocaleString()} L ${s.low.toLocaleString()}`;
}

// ── Price lines (Task 6) ───────────────────────────────────────────────────
function addPriceLines(s) {
  if (candleSeries._priceLines) {
    candleSeries._priceLines.forEach(l => candleSeries.removePriceLine(l));
  }
  candleSeries._priceLines = [
    candleSeries.createPriceLine({
      price: s.vpoc, color: '#d97706', lineWidth: 2,
      lineStyle: LightweightCharts.LineStyle.Solid,
      axisLabelVisible: true, title: 'VPOC'
    }),
    candleSeries.createPriceLine({
      price: s.vah, color: '#ef4444', lineWidth: 1,
      lineStyle: LightweightCharts.LineStyle.Dashed,
      axisLabelVisible: true, title: 'VAH'
    }),
    candleSeries.createPriceLine({
      price: s.val, color: '#22c55e', lineWidth: 1,
      lineStyle: LightweightCharts.LineStyle.Dashed,
      axisLabelVisible: true, title: 'VAL'
    }),
  ];
}

// ── Canvas overlay: VA zone + bubbles (Tasks 6 + 7) ───────────────────────
function redrawOverlay() {
  if (!chart || !candleSeries) return;
  const wrap = document.getElementById('chartWrap');
  overlayCanvas.width  = wrap.clientWidth;
  overlayCanvas.height = wrap.clientHeight;
  overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);

  // VA zone fill
  if (summaryData) {
    const yVah = candleSeries.priceToCoordinate(summaryData.vah);
    const yVal = candleSeries.priceToCoordinate(summaryData.val);
    if (yVah != null && yVal != null) {
      overlayCtx.fillStyle = 'rgba(55,138,221,0.07)';
      overlayCtx.fillRect(0, yVah, overlayCanvas.width, yVal - yVah);
    }
  }

  drawBubbles();
}

function drawBubbles() {
  if (!largeTrades.length || !candleSeries) return;
  const maxVol = Math.max(...largeTrades.map(t => t.volume));

  largeTrades.forEach(t => {
    const epochSec  = tradeEpochSec(currentDate, t.time);
    const candleKey = bucketToCandle(epochSec, currentInterval);
    const x = chart.timeScale().timeToCoordinate(candleKey);
    const y = candleSeries.priceToCoordinate(t.price);
    if (x == null || y == null) return;

    const r = 4 + (t.volume / maxVol) * 14;
    overlayCtx.beginPath();
    overlayCtx.arc(x, y, r, 0, Math.PI * 2);
    overlayCtx.fillStyle = bubbleColor(t.direction);
    overlayCtx.globalAlpha = 0.70;
    overlayCtx.fill();
    overlayCtx.globalAlpha = 1.0;
  });
}

// ── Trade markers: triangles (Task 7) ─────────────────────────────────────
function tradeEpochSec(dateStr, timeStr) {
  const [h, m, s] = timeStr.split(':').map(Number);
  const y = +dateStr.slice(0, 4), mo = +dateStr.slice(4, 6) - 1, d = +dateStr.slice(6, 8);
  return Date.UTC(y, mo, d, h - 8, m, s) / 1000;
}

function bucketToCandle(epochSec, intervalMinutes) {
  const b = intervalMinutes * 60;
  return Math.floor(epochSec / b) * b;
}

function bubbleColor(direction) {
  return direction === 'UP'   ? '#22c55e'   // active buy  → green
       : direction === 'DOWN' ? '#ef4444'   // active sell → red
       : '#666666';                          // neutral     → grey
}

function addTradeMarkers(trades) {
  if (!candleSeries || !trades.length) return;
  const markers = trades.map(t => {
    const candleTime = bucketToCandle(tradeEpochSec(currentDate, t.time), currentInterval);
    return {
      time:     candleTime,
      position: t.direction === 'DOWN' ? 'aboveBar' : 'belowBar',
      color:    t.direction === 'UP'   ? '#22c55e'
              : t.direction === 'DOWN' ? '#ef4444' : '#555555',
      shape:    t.direction === 'UP'   ? 'arrowUp'
              : t.direction === 'DOWN' ? 'arrowDown' : 'circle',
      size: 1,
    };
  });
  candleSeries.setMarkers(markers.sort((a, b) => a.time - b.time));
  redrawOverlay();
}

// ── 明日規劃 ───────────────────────────────────────────────────────────────
function renderPlan(plan) {
  document.getElementById('key-message').textContent = plan.keyMessage;
  renderLevels(plan.levels);
  renderScenarios(plan.scenarios);
}

function renderLevels(levels) {
  const maxVol = Math.max(...Object.values(levels).map(l => l.volume || 0));
  const rows = [];
  if (levels.resistance2) rows.push({ key: 'resistance2', ...levels.resistance2, cls: '' });
  if (levels.resistance1) rows.push({ key: 'resistance1', ...levels.resistance1, cls: '' });
  rows.push({ divider: true, text: `▲ VAH ${levels.vah.price.toLocaleString()}` });
  rows.push({ key: 'vah',  ...levels.vah,  cls: 'level-row-vah' });
  rows.push({ key: 'vpoc', ...levels.vpoc, cls: 'level-row-vpoc' });
  rows.push({ key: 'val',  ...levels.val,  cls: 'level-row-val' });
  rows.push({ divider: true, text: `▼ VAL ${levels.val.price.toLocaleString()}` });
  if (levels.support1) rows.push({ key: 'support1', ...levels.support1, cls: '' });
  if (levels.support2) rows.push({ key: 'support2', ...levels.support2, cls: '' });

  document.getElementById('levels-tbody').innerHTML = rows.map(row => {
    if (row.divider) return `<tr class="divider-row"><td colspan="4">${row.text}</td></tr>`;
    const pct  = maxVol > 0 ? Math.round((row.volume || 0) / maxVol * 100) : 0;
    const bclr = row.cls.includes('vah')  ? '#a32d2d'
               : row.cls.includes('vpoc') ? '#d97706'
               : row.cls.includes('val')  ? '#0f6e56' : '#378add';
    return `<tr class="${row.cls}">
      <td class="level-price">${row.price.toLocaleString()}</td>
      <td class="level-label">${row.label}</td>
      <td class="level-bar-cell"><div class="level-bar-wrap"><div class="level-bar" style="width:${pct}%;background:${bclr}"></div></div></td>
      <td>${(row.volume || 0).toLocaleString()} 口</td>
    </tr>`;
  }).join('');
}

function renderScenarios(scenarios) {
  document.getElementById('scenarios-container').innerHTML = scenarios.map(s => `
    <div class="scenario-card bias-${s.bias}" onclick="this.classList.toggle('open')">
      <div class="scenario-header">
        <div class="scenario-bias-bar"></div>
        <div class="scenario-title">${s.id}. ${s.title}</div>
        <div class="scenario-chevron">▼</div>
      </div>
      <div class="scenario-body">
        <div class="scenario-row"><span class="scenario-key">觸發</span><span>${s.trigger}</span></div>
        <div class="scenario-row"><span class="scenario-key">進場</span><span>${s.entry}</span></div>
        <div class="scenario-row"><span class="scenario-key">目標</span>
          <ul class="scenario-targets">${s.targets.map(t => `<li>${t}</li>`).join('')}</ul></div>
        <div class="scenario-row"><span class="scenario-key">停損</span><span>${s.stopLoss}</span></div>
        <div class="scenario-row"><span class="scenario-key">依據</span>
          <span style="color:var(--muted)">${s.rationale}</span></div>
      </div>
    </div>`).join('');
}

// ── Plan price lines on chart ─────────────────────────────────────────────
// VAH / VPOC / VAL 已由 addPriceLines() 處理，這裡補其餘四條
function addBadges(plan) {
  if (!plan || !candleSeries) return;
  if (candleSeries._badgeLines) {
    candleSeries._badgeLines.forEach(l => candleSeries.removePriceLine(l));
  }
  candleSeries._badgeLines = [];

  const cfg = {
    resistance2: { color: '#f97316', style: LightweightCharts.LineStyle.Dashed   },
    resistance1: { color: '#f97316', style: LightweightCharts.LineStyle.Dashed   },
    support1:    { color: '#22c55e', style: LightweightCharts.LineStyle.Dashed   },
    support2:    { color: '#22c55e', style: LightweightCharts.LineStyle.SparseDotted },
  };

  Object.entries(cfg).forEach(([key, opt]) => {
    const lvl = plan.levels[key];
    if (!lvl) return;
    candleSeries._badgeLines.push(candleSeries.createPriceLine({
      price: lvl.price,
      color: opt.color,
      lineWidth: 1,
      lineStyle: opt.style,
      axisLabelVisible: true,
      title: lvl.label,
    }));
  });
}

// ── VP bars synced to chart y-axis (Task 9) ───────────────────────────────
function renderVpBars(profile) {
  if (!profile.length) return;
  const panel  = document.getElementById('vpPanel');
  const maxVol = Math.max(...profile.map(e => e.volume));
  panel._profile = profile;
  panel._maxVol  = maxVol;
  panel.innerHTML = '';

  profile.forEach((e, i) => {
    const row  = document.createElement('div');
    row.className = 'vp-bar-row';
    row.dataset.idx = i;

    const pct  = Math.round(e.volume / maxVol * 100);
    const fill = document.createElement('div');
    fill.className = 'vp-bar-fill';
    fill.style.width      = pct + '%';
    fill.style.background = vpBarColor(e);
    row.appendChild(fill);
    panel.appendChild(row);
  });

  syncVpBars();
}

function vpBarColor(e) {
  if (e.type === 'VPOC') return '#d97706';
  if (e.type === 'VAH')  return '#a32d2d';
  if (e.type === 'VAL')  return '#0f6e56';
  if (e.type === 'THIN') return '#555555';
  return e.inValueArea ? '#2a5f99' : '#378add';
}

function syncVpBars() {
  if (!candleSeries) return;
  const panel   = document.getElementById('vpPanel');
  const profile = panel._profile;
  if (!profile) return;

  const rows = panel.querySelectorAll('.vp-bar-row');
  profile.forEach((e, i) => {
    const yTop = candleSeries.priceToCoordinate(e.price + 50);
    const yBot = candleSeries.priceToCoordinate(e.price);
    if (yTop == null || yBot == null) { rows[i].style.display = 'none'; return; }
    const top    = Math.min(yTop, yBot);
    const height = Math.max(1, Math.abs(yBot - yTop));
    rows[i].style.display = 'flex';
    rows[i].style.top     = top + 'px';
    rows[i].style.height  = height + 'px';
  });
}

// ── Controls ───────────────────────────────────────────────────────────────
function setIntervalMin(n) {
  currentInterval = n;
  ['1', '5', '15'].forEach(id =>
    document.getElementById('btn-' + id).classList.toggle('active', String(n) === id));
  if (!currentDate) return;
  if (candleSeries) candleSeries.setMarkers([]);
  loadCandles().then(() => addTradeMarkers(largeTrades));
}

// ── Data loading ───────────────────────────────────────────────────────────
async function loadCandles() {
  const data = await fetch(
    `/api/vp/candles?date=${currentDate}&product=TX&interval=${currentInterval}`
  ).then(r => r.json());
  candleData = data;
  candleSeries.setData(data.map(c => ({
    time: c.time, open: c.open, high: c.high, low: c.low, close: c.close
  })));
  volumeSeries.setData(data.map(c => ({
    time:  c.time,
    value: c.volume,
    color: c.close >= c.open ? 'rgba(239,68,68,0.6)' : 'rgba(34,197,94,0.6)',
  })));
  chart.timeScale().fitContent();
  redrawOverlay();
  syncVpBars();
}

async function loadAll(date) {
  currentDate = date;
  const [summary, trades, profile, plan] = await Promise.all([
    fetch(`/api/vp/summary?date=${date}&product=TX`).then(r => r.json()),
    fetch(`/api/vp/large-trades?date=${date}&product=TX&threshold=50`).then(r => r.json()),
    fetch(`/api/vp/profile?date=${date}&product=TX&step=50`).then(r => r.json()),
    fetch(`/api/vp/plan?date=${date}&product=TX`).then(r => r.json()),
  ]);
  summaryData = summary;
  largeTrades = trades;
  profileData = profile;
  planData    = plan;

  renderMetrics(summary);
  addPriceLines(summary);
  renderVpBars(profile);

  if (candleSeries) candleSeries.setMarkers([]);
  await loadCandles();
  addTradeMarkers(trades);
  addBadges(plan);
  renderPlan(plan);
}

// ── Init ───────────────────────────────────────────────────────────────────
async function init() {
  initChart();
  const dates = await fetch('/api/vp/available-dates?product=TX').then(r => r.json());
  const sel = document.getElementById('dateSelect');
  sel.innerHTML = dates.map(d =>
    `<option value="${d}">${d.slice(0,4)}/${d.slice(4,6)}/${d.slice(6,8)}</option>`
  ).join('');
  sel.onchange = () => loadAll(sel.value);
  if (dates.length > 0) loadAll(dates[0]);
}

init();
</script>
