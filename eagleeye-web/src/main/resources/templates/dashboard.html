<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EagleEye — 外資追蹤儀表板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #1a1a1a;
  --surface:  #222222;
  --border:   #333333;
  --text:     #e0e0e0;
  --muted:    #888888;
  --amber:    #d97706;
  --amber-dim:#92510440;
  --red:      #ef4444;
  --red-dim:  rgba(239,68,68,0.25);
  --green:    #22c55e;
  --green-dim:rgba(34,197,94,0.25);
  --grid:     #2a2a2a;
  --mono:     'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'SF Mono', monospace;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  font-size: 12px;
}

/* ── Header ─────────────────────────────────────────────────────────── */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.header-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 10px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--amber);
  letter-spacing: 0.5px;
}
.header-title span { color: var(--muted); font-weight: 400; }
.header-sub { font-size: 10px; color: var(--muted); margin-top: 3px; }

/* ── Range toggle ───────────────────────────────────────────────────── */
.range-toggle { display: flex; gap: 4px; }
.range-btn {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 3px 12px;
  border-radius: 3px;
  cursor: pointer;
  font-size: 11px;
  font-family: var(--mono);
  text-decoration: none;
  transition: border-color 0.15s, color 0.15s;
}
.range-btn:hover:not(.active) { border-color: var(--amber); color: var(--amber); }
.range-btn.active { border-color: var(--amber); color: var(--amber); background: var(--amber-dim); }

/* ── Layout ─────────────────────────────────────────────────────────── */
.container { max-width: 1200px; margin: 0 auto; padding: 14px 16px; }

.chart-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.chart-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 12px 14px 10px;
}

.chart-title {
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 10px;
}

@media (max-width: 800px) {
  .chart-grid { grid-template-columns: 1fr; }
}

/* ── Delta table ────────────────────────────────────────────────────── */
.delta-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 11px;
  font-family: var(--mono);
}
.delta-table th {
  color: var(--muted);
  font-weight: 600;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 5px 12px;
  border-bottom: 1px solid var(--border);
  text-align: right;
}
.delta-table th:first-child { text-align: left; }
.delta-table td {
  padding: 4px 12px;
  border-bottom: 1px solid var(--grid);
  text-align: right;
  font-variant-numeric: tabular-nums;
  color: var(--text);
}
.delta-table td:first-child { text-align: left; color: var(--muted); }
.delta-table tr:first-child td { color: var(--text); background: #282828; }
.delta-table tr:hover td { background: #282828; }

.up   { color: var(--red); }
.down { color: var(--green); }
.neu  { color: var(--muted); }
.settle { color: var(--amber); }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div>
      <div class="header-title">EagleEye <span>/ 外資追蹤儀表板</span></div>
      <div class="header-sub">外資現貨 · 期貨 · 選擇權 · 融資券 vs 加權指數</div>
    </div>
    <div class="range-toggle">
      <a th:href="@{/dashboard(days=20)}" class="range-btn" th:classappend="${vm.days == 20} ? ' active'">20d</a>
      <a th:href="@{/dashboard(days=40)}" class="range-btn" th:classappend="${vm.days == 40} ? ' active'">40d</a>
      <a th:href="@{/dashboard(days=60)}" class="range-btn" th:classappend="${vm.days == 60} ? ' active'">60d</a>
    </div>
  </div>
</div>

<div class="container">
  <div class="chart-grid">

    <div class="chart-card">
      <div class="chart-title">外資買賣超</div>
      <canvas id="spotChart"></canvas>
    </div>

    <div class="chart-card">
      <div class="chart-title">資券變化</div>
      <canvas id="marginChart"></canvas>
    </div>

    <div class="chart-card">
      <div class="chart-title">外資期貨部位</div>
      <canvas id="futuresChart"></canvas>
    </div>

    <div class="chart-card">
      <div class="chart-title">外資選擇權</div>
      <canvas id="optionsChart"></canvas>
    </div>

  </div>

  <div class="chart-card" style="margin-top:10px;">
    <div class="chart-title">外資期貨日增減（多單 vs 空單）</div>
    <div id="futuresDeltaTable"></div>
  </div>

</div>

<script th:inline="javascript">
/*<![CDATA[*/
const isoDates      = /*[[${vm.isoDates}]]*/ [];
const labels        = /*[[${vm.dateLabels}]]*/ [];
const taiexData     = /*[[${vm.taiexClose}]]*/ [];
const spotNet       = /*[[${vm.spotNetFlow}]]*/ [];
const marginChg     = /*[[${vm.marginChange}]]*/ [];
const shortChg      = /*[[${vm.shortChange}]]*/ [];
const futLong       = /*[[${vm.futuresLongOI}]]*/ [];
const futShort      = /*[[${vm.futuresShortOI}]]*/ [];
const optCall       = /*[[${vm.optionsCallOI}]]*/ [];
const optPut        = /*[[${vm.optionsPutOI}]]*/ [];

const AMBER   = '#d97706';
const RED     = 'rgba(239,68,68,0.8)';
const RED_DIM = 'rgba(239,68,68,0.3)';
const GREEN   = 'rgba(34,197,94,0.8)';
const GRN_DIM = 'rgba(34,197,94,0.3)';
const GRID    = '#2a2a2a';
const TEXT    = '#888888';

function taiexDs() {
  return {
    type: 'line', label: '加權指數',
    data: taiexData,
    borderColor: AMBER, borderWidth: 1.5,
    pointRadius: 0, tension: 0.2,
    yAxisID: 'y2', fill: false, order: 0
  };
}

function opts(yFmt) {
  return {
    responsive: true,
    maintainAspectRatio: true,
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: {
        display: true, position: 'bottom',
        labels: { boxWidth: 10, font: { size: 10, family: "'JetBrains Mono', monospace" }, color: TEXT, padding: 12 }
      },
      tooltip: {
        backgroundColor: '#2a2a2a',
        borderColor: '#444',
        borderWidth: 1,
        titleColor: '#e0e0e0',
        bodyColor: '#aaa',
        titleFont: { family: "'JetBrains Mono', monospace", size: 11 },
        bodyFont:  { family: "'JetBrains Mono', monospace", size: 11 }
      }
    },
    scales: {
      x: {
        ticks: { color: TEXT, font: { size: 9 }, maxRotation: 45, maxTicksLimit: 12 },
        grid: { color: GRID }
      },
      y: {
        position: 'left',
        ticks: { color: TEXT, font: { size: 9 }, callback: yFmt },
        grid: { color: GRID }
      },
      y2: {
        position: 'right',
        ticks: {
          color: AMBER, font: { size: 9 },
          callback: v => v >= 1000 ? (v / 1000).toFixed(0) + 'K' : v
        },
        grid: { drawOnChartArea: false }
      }
    }
  };
}

const fmtYi = v => {
  const yi = v / 1e8;
  return (yi >= 0 ? '+' : '') + yi.toFixed(1);
};
const fmtThousand = v => {
  if (Math.abs(v) >= 10000) return (v / 10000).toFixed(1) + 'W';
  if (Math.abs(v) >= 1000)  return (v / 1000).toFixed(1) + 'K';
  return String(v);
};

// Chart 1: 外資買賣超
new Chart(document.getElementById('spotChart'), {
  data: {
    labels,
    datasets: [
      {
        type: 'bar', label: '外資(億)',
        data: spotNet.map(v => v / 1e8),
        backgroundColor: spotNet.map(v => v >= 0 ? RED : GREEN),
        yAxisID: 'y', order: 1
      },
      taiexDs()
    ]
  },
  options: opts(fmtYi)
});

// Chart 2: 資券變化
new Chart(document.getElementById('marginChart'), {
  data: {
    labels,
    datasets: [
      { type: 'bar', label: '融資變化', data: marginChg, backgroundColor: RED,   yAxisID: 'y', order: 1 },
      { type: 'bar', label: '融券變化', data: shortChg,  backgroundColor: GREEN, yAxisID: 'y', order: 1 },
      taiexDs()
    ]
  },
  options: opts(fmtThousand)
});

const RED_POS = RED, RED_NEG = RED_DIM, GREEN_POS = GREEN, GREEN_NEG = GRN_DIM;

// Chart 3: 外資期貨部位
new Chart(document.getElementById('futuresChart'), {
  data: {
    labels,
    datasets: [
      { type: 'bar', label: '外資多單', data: futLong,  backgroundColor: RED,   yAxisID: 'y', order: 1 },
      { type: 'bar', label: '外資空單', data: futShort, backgroundColor: GREEN, yAxisID: 'y', order: 1 },
      taiexDs()
    ]
  },
  options: opts(fmtThousand)
});

// Chart 4: 外資選擇權
new Chart(document.getElementById('optionsChart'), {
  data: {
    labels,
    datasets: [
      { type: 'bar', label: '外資買權', data: optCall, backgroundColor: RED,   yAxisID: 'y', order: 1 },
      { type: 'bar', label: '外資賣權', data: optPut,  backgroundColor: GREEN, yAxisID: 'y', order: 1 },
      taiexDs()
    ]
  },
  options: opts(fmtThousand)
});

// 台指期結算日 = 每月第三個週三 (day 15–21, weekday=3)
function isSettlement(iso) {
  const d = new Date(iso + 'T00:00:00');
  const dom = d.getDate();
  return d.getDay() === 3 && dom >= 15 && dom <= 21;
}

// Table 5: 外資期貨日增減
function delta(arr) {
  return arr.map((v, i) => {
    if (i === 0 || v == null || arr[i - 1] == null) return null;
    return v - arr[i - 1];
  });
}
const futLongDelta  = delta(futLong);
const futShortDelta = delta(futShort);

const NEU = '<span class="neu">—</span>';
function fmtDelta(v) {
  if (v == null) return NEU;
  const cls = v > 0 ? 'up' : v < 0 ? 'down' : 'neu';
  return `<span class="${cls}">${v > 0 ? '+' : ''}${v.toLocaleString()}</span>`;
}
function fmtNet(v) {
  if (v == null) return NEU;
  const cls = v > 0 ? 'up' : v < 0 ? 'down' : 'neu';
  return `<span class="${cls}">${v > 0 ? '+' : ''}${v.toLocaleString()}</span>`;
}
function fmtVol(v) {
  return v != null ? v.toLocaleString() : '—';
}

(function buildTable() {
  const rows = labels.map((lbl, i) => {
    const settle = isSettlement(isoDates[i]);
    const l = futLong[i], s = futShort[i];
    return {
      lbl: settle ? `<span class="settle">${lbl} *</span>` : lbl,
      long: l, longD: futLongDelta[i],
      short: s, shortD: futShortDelta[i],
      net: (l != null && s != null) ? l - s : null
    };
  }).reverse();

  const html = `<table class="delta-table">
    <thead><tr>
      <th>日期</th>
      <th>多單</th><th>Δ多單</th>
      <th>空單</th><th>Δ空單</th>
      <th>淨部位</th>
    </tr></thead>
    <tbody>${rows.map(r => `<tr>
      <td>${r.lbl}</td>
      <td>${fmtVol(r.long)}</td>
      <td>${fmtDelta(r.longD)}</td>
      <td>${fmtVol(r.short)}</td>
      <td>${fmtDelta(r.shortD)}</td>
      <td>${fmtNet(r.net)}</td>
    </tr>`).join('')}</tbody>
  </table>`;
  document.getElementById('futuresDeltaTable').innerHTML = html;
})();
/*]]>*/
</script>

</body>
</html>
