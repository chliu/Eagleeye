<!DOCTYPE html>
<html lang="zh-TW" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EagleEye — 外資追蹤儀表板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #f0f0f0; color: #222; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; }

.header {
  background: #fff;
  border-bottom: 1px solid #d0d0d0;
}
.header-inner {
  max-width: 1100px;
  margin: 0 auto;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.header-title { font-size: 15px; font-weight: 700; color: #1a237e; }
.header-sub   { font-size: 11px; color: #777; margin-top: 2px; }

.range-toggle { display: flex; gap: 6px; }
.range-btn {
  background: #f0f0f0;
  border: 1px solid #bbb;
  color: #555;
  padding: 4px 16px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 12px;
  text-decoration: none;
  transition: background 0.15s;
}
.range-btn:hover:not(.active) { background: #e0e0e0; }
.range-btn.active { background: #1565c0; border-color: #1565c0; color: #fff; }

.container { max-width: 1100px; margin: 0 auto; padding: 14px; }
.chart-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.chart-card {
  background: #fff;
  border: 1px solid #d0d0d0;
  border-radius: 4px;
  padding: 12px 14px 10px;
}
.chart-title {
  font-size: 13px;
  font-weight: 600;
  color: #333;
  text-align: center;
  margin-bottom: 8px;
  letter-spacing: 0.3px;
}

@media (max-width: 800px) {
  .chart-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div>
      <div class="header-title">EagleEye — 外資追蹤儀表板</div>
      <div class="header-sub">外資現貨 / 期貨 / 選擇權 / 融資券 vs 加權指數</div>
    </div>
    <div class="range-toggle">
      <a th:href="@{/dashboard(days=20)}" class="range-btn" th:classappend="${vm.days == 20} ? ' active'">20天</a>
      <a th:href="@{/dashboard(days=40)}" class="range-btn" th:classappend="${vm.days == 40} ? ' active'">40天</a>
      <a th:href="@{/dashboard(days=60)}" class="range-btn" th:classappend="${vm.days == 60} ? ' active'">60天</a>
    </div>
  </div>
</div>

<div class="container">
  <div class="chart-grid">

    <div class="chart-card">
      <div class="chart-title">外資買賣超</div>
      <canvas id="spotChart"></canvas>
    </div>

    <div class="chart-card">
      <div class="chart-title">資券變化</div>
      <canvas id="marginChart"></canvas>
    </div>

    <div class="chart-card">
      <div class="chart-title">外資期貨部位</div>
      <canvas id="futuresChart"></canvas>
    </div>

    <div class="chart-card">
      <div class="chart-title">外資選擇權</div>
      <canvas id="optionsChart"></canvas>
    </div>

  </div>
</div><!-- .container -->

<script th:inline="javascript">
/*<![CDATA[*/
const labels        = /*[[${vm.dateLabels}]]*/ [];
const taiexData     = /*[[${vm.taiexClose}]]*/ [];
const spotNet       = /*[[${vm.spotNetFlow}]]*/ [];
const marginChg     = /*[[${vm.marginChange}]]*/ [];
const shortChg      = /*[[${vm.shortChange}]]*/ [];
const futLong       = /*[[${vm.futuresLongOI}]]*/ [];
const futShort      = /*[[${vm.futuresShortOI}]]*/ [];
const optCall       = /*[[${vm.optionsCallOI}]]*/ [];
const optPut        = /*[[${vm.optionsPutOI}]]*/ [];

const TAIEX_COLOR = '#1565c0';
const RED         = 'rgba(198,40,40,0.85)';
const GREEN       = 'rgba(46,125,50,0.85)';
const GRID        = '#e8e8e8';

function taiexDs() {
  return {
    type: 'line', label: '加權指數',
    data: taiexData,
    borderColor: TAIEX_COLOR, borderWidth: 1.5,
    pointRadius: 0, tension: 0.2,
    yAxisID: 'y2', fill: false, order: 0
  };
}

function opts(yFmt) {
  return {
    responsive: true,
    maintainAspectRatio: true,
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: {
        display: true, position: 'bottom',
        labels: { boxWidth: 12, font: { size: 10 }, color: '#444', padding: 10 }
      }
    },
    scales: {
      x: {
        ticks: { color: '#666', font: { size: 9 }, maxRotation: 45, maxTicksLimit: 12 },
        grid: { color: GRID }
      },
      y: {
        position: 'left',
        ticks: { color: '#555', font: { size: 9 }, callback: yFmt },
        grid: { color: GRID }
      },
      y2: {
        position: 'right',
        ticks: {
          color: TAIEX_COLOR, font: { size: 9 },
          callback: v => v >= 1000 ? (v / 1000).toFixed(0) + 'K' : v
        },
        grid: { drawOnChartArea: false }
      }
    }
  };
}

const fmtYi = v => {
  const yi = v / 1e8;
  return (yi >= 0 ? '+' : '') + yi.toFixed(1);
};

const fmtThousand = v => {
  if (Math.abs(v) >= 10000) return (v / 10000).toFixed(1) + 'W';
  if (Math.abs(v) >= 1000)  return (v / 1000).toFixed(1) + 'K';
  return String(v);
};

// Chart 1: 外資買賣超 — single bar, red=buy / green=sell
new Chart(document.getElementById('spotChart'), {
  data: {
    labels,
    datasets: [
      {
        type: 'bar', label: '外資(億)',
        data: spotNet.map(v => v / 1e8),
        backgroundColor: spotNet.map(v => v >= 0 ? RED : GREEN),
        yAxisID: 'y', order: 1
      },
      taiexDs()
    ]
  },
  options: opts(fmtYi)
});

// Chart 2: 資券變化 — margin delta (red) + short delta (green)
new Chart(document.getElementById('marginChart'), {
  data: {
    labels,
    datasets: [
      { type: 'bar', label: '融資變化', data: marginChg, backgroundColor: RED,   yAxisID: 'y', order: 1 },
      { type: 'bar', label: '融券變化', data: shortChg,  backgroundColor: GREEN, yAxisID: 'y', order: 1 },
      taiexDs()
    ]
  },
  options: opts(fmtThousand)
});

// Chart 3: 外資期貨部位 — long OI (red, positive) + short OI (green, negative)
new Chart(document.getElementById('futuresChart'), {
  data: {
    labels,
    datasets: [
      { type: 'bar', label: '外資多單', data: futLong,  backgroundColor: RED,   yAxisID: 'y', order: 1 },
      { type: 'bar', label: '外資空單', data: futShort, backgroundColor: GREEN, yAxisID: 'y', order: 1 },
      taiexDs()
    ]
  },
  options: opts(fmtThousand)
});

// Chart 4: 外資選擇權 — call OI (red, positive) + put OI (green, negative)
new Chart(document.getElementById('optionsChart'), {
  data: {
    labels,
    datasets: [
      { type: 'bar', label: '外資買權', data: optCall, backgroundColor: RED,   yAxisID: 'y', order: 1 },
      { type: 'bar', label: '外資賣權', data: optPut,  backgroundColor: GREEN, yAxisID: 'y', order: 1 },
      taiexDs()
    ]
  },
  options: opts(fmtThousand)
});
/*]]>*/
</script>

</body>
</html>
